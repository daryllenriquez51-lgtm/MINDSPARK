<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matching Type</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background-image: url('wrdconnect.png');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      position: relative;
      margin-top: -30px; /* slight overall upward shift */
    }

    /* ===== WORKING BACK BUTTON (solid white circle) ===== */
    .back-btn {
      position: fixed;
      top: 22px;
      left: 22px;
      width: 54px;
      height: 54px;
      background-color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #333;
      font-size: 36px;
      font-weight: 400;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: 0.2s ease;
      z-index: 999;
      border: 2px solid rgba(255, 255, 255, 0.8);
      cursor: pointer; /* ensure pointer cursor */
    }

    .back-btn:hover {
      background-color: #f0f0f0;
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    }

    .icon-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    /* BIGGER ICON */
    .icon-row img {
      width: 120px;
      height: 155px;
      border-radius: 14px;
      object-fit: cover;
    }

    h1 {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4);
      margin-bottom: 0px;
      line-height: 1.1;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      opacity: 0.9;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background-color: white;
      opacity: 0.6;
      margin: 8px 0 15px;
    }

    /* Info section */
    .info-section {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      flex-wrap: wrap;
      text-align: left;
      margin-bottom: 0px;
      position: relative;
      padding: 10px 0;
    }

    /* Divider line between sections */
    .info-section::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background-color: rgba(255, 255, 255, 0.3);
      transform: translateX(-50%);
    }

    .stats {
      display: flex;
      gap: 90px;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding-right: 50px;
    }

    .stats div {
      text-align: center;
      flex: 1;
      min-width: 120px;
    }

    .stats h3 {
      font-size: 64px;
      margin-bottom: 6px;
      font-weight: 800;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.4);
    }

    .stats p {
      font-size: 18px;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    .benefits {
      text-align: left;
      flex: 1;
      padding-left: 50px;
      font-size: 16px;
      line-height: 2em;
      opacity: 0.9;
      min-width: 250px;
    }

    .benefits strong {
      font-size: 22px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 10px;
    }

    .benefits p {
      margin: 6px 0;
    }

    /* PLAY BUTTON - ONLY THIS IS LOWERED */
    .play-btn {
      background: rgba(255, 255, 255, 0.85);
      color: #4a2f2f;
      padding: 18px 90px;
      border-radius: 50px;
      border: none;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.25);
      margin-top: 45px; /* lowered the play button */
      transition: 0.2s ease;
    }

    .play-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.3);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        margin-top: 0;
      }
      .info-section {
        flex-direction: column;
        align-items: center;
      }

      .info-section::after {
        display: none;
      }

      .stats {
        padding: 0;
        margin-bottom: 40px;
      }

      .benefits {
        padding: 0;
        text-align: center;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      h2 {
        font-size: 18px;
      }

      .stats h3 {
        font-size: 48px;
      }

      .play-btn {
        padding: 16px 70px;
        font-size: 24px;
        margin-top: 35px;
      }

      .icon-row img {
        width: 100px;
        height: 130px;
      }

      .back-btn {
        width: 48px;
        height: 48px;
        font-size: 32px;
        top: 15px;
        left: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 
      ===== BACK BUTTON - Navigates to MINDSPARKKK.html =====
    -->
    <a href="MINDSPARKKK.html" class="back-btn" id="backButton">←</a>

    <div class="icon-row">
      <img src="wrdco.png" alt="recall quest logo">
    </div>

    <h1>WORD CONNECT</h1>
    <h2>GAMES</h2>

    <div class="divider"></div>

    <div class="info-section">
      <div class="stats">
        <div>
          <h3 id="score">0</h3>
          <p>HIGH SCORE</p>
        </div>
        <div>
          <h3 id="difficulty">0</h3>
          <p>DIFFICULTY</p>
        </div>
      </div>

      <div class="benefits">
        <strong>BENEFITS:</strong>
        <p>🔤 Improves spelling and word formation skills.</p>
        <p>🧩 Helps recognize word patterns.</p>
        <p>📚 Expands vocabulary through word discovery.</p>
      </div>
    </div>

    <div class="divider"></div>

    <button class="play-btn" id="playBtn">PLAY</button>
  </div>

  <script>
    // ---------- HIGH SCORE SYSTEM (localStorage) ----------
    const STORAGE_KEY = 'wordConnect_highScore';
    
    // Load saved high score on page load
    let savedHighScore = localStorage.getItem(STORAGE_KEY);
    let highScore = savedHighScore ? parseInt(savedHighScore) : 0;
    let difficulty = 0;

    const scoreDisplay = document.getElementById("score");
    const difficultyDisplay = document.getElementById("difficulty");
    const playBtn = document.getElementById("playBtn");
    const backBtn = document.getElementById("backButton");

    // Display loaded high score (0 if first time)
    scoreDisplay.textContent = highScore;
    difficultyDisplay.textContent = difficulty;

    // Play button redirect - go to game
    playBtn.addEventListener("click", () => {
      window.location.href = "word connect.html";
    });

    // Back button functionality - navigates to MINDSPARKKK.html
    backBtn.addEventListener("click", (e) => {
      console.log("Navigating to MINDSPARKKK.html");
    });
  </script>
</body>
</html>
