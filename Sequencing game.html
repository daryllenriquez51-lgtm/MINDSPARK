<!DOCTYPE html>

<style>
    body {
        background-image: url('word%20connectttt.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: #000;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    @keyframes backgroundMove {
        0% { background-position: 0% 0%; }
        50% { background-position: 100% 100%; }
        100% { background-position: 0% 0%; }
    }

    .game {
        width: 850px;
        background: rgba(255, 255, 255, 0.5);
        padding: 20px;
        border-radius: 14px;
        animation: fadeIn 1s ease-in-out;
    }

    .game.glow {
        animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
        from { box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        to { box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
    }

    h1 {
        margin: 0 0 5px;
    }

    .level {
        color: #3a3838;
        margin-bottom: 10px;
    }

    .board {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 15px;
        min-height: 150px;
    }

    .card {
        width: 160px;
        background: #1f1f1f;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid #333;
        transition: 0.2s;
    }

    .card:hover {
        transform: scale(1.04);
    }

    .card img {
        width: 100%;
        height: 90px;
        object-fit: cover;
    }

    .info {
        padding: 6px;
        font-size: 12px;
        text-align: center;
        color: #fff;
    }

    .step {
        font-weight: bold;
        color: #ffd369;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #fff;
        font-weight: bold;
        cursor: pointer;
    }

    .result {
        text-align: center;
        margin-top: 10px;
        font-weight: bold;
    }
</style>

let currentLevel = 0;
const scrambled = document.getElementById("scrambled");
const answer = document.getElementById("answer");

function loadLevel() {
    scrambled.innerHTML = "";
    answer.innerHTML = "";
    document.getElementById("result").textContent = "";
    document.getElementById("levelText").textContent = levels[currentLevel].title;

    [...levels[currentLevel].cards]
        .sort(() => Math.random() - 0.5)
        .forEach(c => {
            const card = document.createElement("div");
            card.className = "card";
            card.dataset.order = c.order;
            card.innerHTML = `
                <img src="${c.img}">
                <div class="info">
                    ${c.text}
                </div>`;
            scrambled.appendChild(card);
        });
}

scrambled.addEventListener("click", e => {
    const card = e.target.closest(".card");
    if (card) answer.appendChild(card);
});

answer.addEventListener("click", e => {
    const card = e.target.closest(".card");
    if (card) scrambled.appendChild(card);
});

function checkOrder() {
    const cards = answer.querySelectorAll(".card");
    let correct = true;

    cards.forEach((card, i) => {
        if (parseInt(card.dataset.order) !== i + 1) correct = false;
    });

    if (correct) {
        document.getElementById("result").textContent = "✅ Correct! Moving to next level...";
        setTimeout(() => {
            currentLevel++;
            if (currentLevel < levels.length) loadLevel();
            else document.getElementById("result").textContent = "🎉 All levels completed!";
        }, 1200);
    } else {
        document.getElementById("result").textContent = "❌ Try again!";
    }
}

loadLevel();
