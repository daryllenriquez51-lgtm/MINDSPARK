<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>4 Pics 1 Word — 20 Levels</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Rubik:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --panel: #ffffff;
    --tile-border: #e6eef8;
    --accent: #2b8a4b;
    --shadow: rgba(6,24,50,0.18);
  }

  html, body {
    height: 100%;
    margin: 0;
    font-family: "Rubik", sans-serif;
    background: url('4 pic 1 wrd bg.png') center/cover no-repeat fixed;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    width: 1100px;
    max-width: 95%;
    display: grid;
    grid-template-columns: 600px 1fr;
    gap: 32px;
    align-items: center;
  }

  .card {
    background: var(--panel);
    border-radius: 28px;
    padding: 28px;
    box-shadow: 0 6px 18px var(--shadow);
  }

  .grid4 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 22px;
    height: 520px;
  }

  .cell {
    border: 4px solid #dfe9f6;
    border-radius: 4px;
    overflow: hidden;
    background: #fff;
  }

  .cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .slots {
    display: flex;
    gap: 14px;
  }

  .slot {
    width: 72px;
    height: 72px;
    background: #f5faff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-family: "Montserrat";
    font-size: 34px;
    box-shadow: 0 6px 8px rgba(30,60,120,0.12);
    border: 6px solid #fff;
    user-select: none;
  }

  .slot.empty {
    background: transparent;
    border: 6px solid rgba(255,255,255,0.4);
    box-shadow: none;
  }

  .pool {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }

  .letter {
    width: 64px;
    height: 64px;
    background: #fff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-family: "Montserrat";
    font-size: 26px;
    box-shadow: 0 8px 14px rgba(40,60,120,0.12);
    border: 6px solid var(--tile-border);
    cursor: pointer;
    user-select: none;
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    pointer-events: none;
    transition: .4s;
  }

  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .celebrate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
  }

  .final-word {
    display: flex;
    gap: 12px;
  }

  .final-word .slot {
    width: 90px;
    height: 90px;
    font-size: 42px;
  }

  .nextBtn {
    background: #a0cfa0;
    padding: 16px 26px;
    border-radius: 40px;
    border: 6px solid #fff;
    font-weight: 800;
    cursor: pointer;
    font-family: "Montserrat";
  }

  .level-display {
    font-weight: 700;
    font-size: 20px;
    color: #1b3b1b;
    background: #e8ffe8;
    border: 3px solid #a0cfa0;
    padding: 6px 16px;
    border-radius: 40px;
  }

  /* Back button */
  .back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 50px;
    height: 50px;
    background-color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #333;
    font-size: 28px;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    z-index: 100;
    cursor: pointer;
  }

  .back-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
  <!-- Back button -->
  <a href="4%20PIC%201%20Word%20homepage.html" class="back-btn" id="backBtn">←</a>

  <div class="wrap">
    <div class="card">
      <div class="grid4" id="imageGrid"></div>
    </div>

    <div class="right">
      <div class="level-display" id="levelDisplay"></div>
      <div class="slots" id="slots"></div>
      <div class="pool" id="pool"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="celebrate">
      <div class="final-word" id="finalWord"></div>
      <div class="nextBtn" id="nextBtn">NEXT ▶</div>
    </div>
  </div>

<script>
const levels = [
  {word:"MOUSE",imgs:["7c9795f1-b296-44ff-b356-f74e24241a09.jpg","3fbb94f7-bc00-455b-b777-083bee18c8f9.jpg","f9676ef2-2067-4f95-81b0-c12677b80b77.jpg","R.jpg"]},
  {word:"APPLE",imgs:["apple_158989157_250.jpg","images__1_-removebg-preview.png","images-removebg-preview.png","images.png"]},
  {word:"CLOUD",imgs:["clloufddd.jpg","rain-storm-clip-art-12.png","night.jpg","animated-rain-clouds-30.png"]},
  {word:"TRAIN",imgs:["images%20(8).jpeg","images%20(7).jpeg","shopping.webp","images%20(6).jpeg"]},
  {word:"HOUSE",imgs:["download.jpeg","download%20(3).jpeg","download%20(2).jpeg","download%20(1).jpeg"]},
  {word:"WATER",imgs:["download%20(7).jpeg","download%20(5).jpeg","download%20(6).jpeg","download%20(4).jpeg"]},
  {word:"CHAIR",imgs:["shopping%20(1).webp","shopping%20(1)%20(1).webp","download.webp","download%20(1).webp"]},
  {word:"BREAD",imgs:["Bread-Variety.jpg","bghfgdfgd.webp","nnnnnmmm.webp","Bread-Variety.jpg"]},
  {word:"PLANT",imgs:["plant1.webp","plant2.jpg","plant3.png","plant4.webp"]},
  {word:"SNAKE",imgs:["images%20(7)%20(1).jpeg","download%20(8).jpeg","snakeplant.webp","download%20(6).webp"]},
  {word:"LIGHT",imgs:["download%20(1)%20(1).jpeg","images%20(9).jpeg","images%20(677).jpeg","shopping%20(2).webp"]},
  {word:"SPOON",imgs:["shopping%20(3).webp","images%20(10).jpeg","images%20(11).jpeg","download%20(7).webp"]},
  {word:"RIVER",imgs:["images%20(12).jpeg","images%20(14).jpeg","download%20(2)%20(1).jpeg","images%20(13).jpeg"]},
  {word:"CLOCK",imgs:["shopping%20(5).webp","shopping%20(4).webp","detailed-clock-face-vector-illustration-designs_1147429-18141.avif","f_35714662_1692088875323_bg_processed.jpg"]},
  {word:"HORSE",imgs:["images%20(15).jpeg","images%20(16).jpeg","images%20(17).jpeg","download%20(3)%20(1).jpeg"]},
  {word:"SMILE",imgs:["download%20(4)%20(1).jpeg","images%20(19).jpeg","images%20(18).jpeg","download%20(10).webp"]},
  {word:"PIZZA",imgs:["images%20(20).jpeg","images%20(21).jpeg","images%20(22).jpeg","download%20(5)%20(1).jpeg"]},
  {word:"SHOES",imgs:["images%20(23).jpeg","download%20(6)%20(1).jpeg","images%20(25).jpeg","images%20(24).jpeg"]},
  {word:"BRUSH",imgs:["images%20(28).jpeg","images%20(29).jpeg","images%20(30).jpeg","images%20(27).jpeg"]},
  {word:"FLOOR",imgs:["images%20(31).jpeg","images%20(34).jpeg","images%20(33).jpeg","images%20(32).jpeg"]}
];

const slots = document.getElementById("slots");
const pool = document.getElementById("pool");
const overlay = document.getElementById("overlay");
const finalWord = document.getElementById("finalWord");
const nextBtn = document.getElementById("nextBtn");
const imageGrid = document.getElementById("imageGrid");
const levelDisplay = document.getElementById("levelDisplay");

let level = 0;
let slotState = [];
let poolState = [];

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function loadLevel(){
  const current = levels[level];
  levelDisplay.textContent = `Level ${level+1} / ${levels.length}`;
  slotState = new Array(current.word.length).fill(null);
  const allLetters = generateLetters(current.word);
  createSlots(current.word);
  createPool(allLetters);
  showImages(current.imgs);
}

function showImages(imgs){
  imageGrid.innerHTML="";
  imgs.forEach(src=>{
    const div=document.createElement("div");
    div.className="cell";
    div.innerHTML=`<img src="${src}" alt="">`;
    imageGrid.appendChild(div);
  });
}

function createSlots(word){
  slots.innerHTML="";
  for(let i=0;i<word.length;i++){
    const s=document.createElement("div");
    s.className="slot empty";s.dataset.i=i;
    s.onclick=()=>removeFromSlot(i);
    slots.appendChild(s);
  }
}

function generateLetters(word){
  const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const letters=word.split("");
  while(letters.length<10){
    const r=alphabet[Math.floor(Math.random()*alphabet.length)];
    if(!letters.includes(r))letters.push(r);
  }
  shuffle(letters);
  return letters;
}

function createPool(arr){
  pool.innerHTML="";poolState=[];
  arr.forEach(L=>{
    const el=document.createElement("div");
    el.className="letter";el.textContent=L;el.dataset.letter=L;
    el.onclick=()=>placeLetter(L,el);
    pool.appendChild(el);
    poolState.push({L,el});
  });
}

function placeLetter(L,el){
  const idx=slotState.findIndex(x=>x===null);
  if(idx===-1)return;
  slotState[idx]=L;
  const s=slots.children[idx];
  s.textContent=L;s.classList.remove("empty");
  el.style.visibility="hidden";
  checkAuto();
}

function removeFromSlot(i){
  if(!slotState[i])return;
  const L=slotState[i];
  const s=slots.children[i];
  s.textContent="";s.classList.add("empty");
  const found=poolState.find(p=>p.L===L && p.el.style.visibility==="hidden");
  if(found)found.el.style.visibility="visible";
  slotState[i]=null;
}

function checkAuto(){
  if(slotState.includes(null))return;
  const word=slotState.join("");
  const correct=levels[level].word;
  if(word===correct)showWin();
  else flashWrong();
}

function flashWrong(){
  slots.animate([{transform:"translateX(0)"},{transform:"translateX(-8px)"},{transform:"translateX(8px)"},{transform:"translateX(0)"}],{duration:400});
  setTimeout(()=>resetWrong(),500);
}

function resetWrong(){
  for(let i=0;i<slotState.length;i++){removeFromSlot(i);}
}

function showWin(){
  finalWord.innerHTML="";
  levels[level].word.split("").forEach(ch=>{
    const d=document.createElement("div");
    d.className="slot";d.textContent=ch;
    finalWord.appendChild(d);
  });
  overlay.classList.add("show");
}

nextBtn.onclick=()=>{
  overlay.classList.remove("show");
  level++;
  updateScore(); // Update current score when level changes
  if(level>=levels.length){
    alert("🎉 You finished all 20 levels!");
    level=0;
  }
  loadLevel();
}

/* ===== HIGH SCORE SYSTEM ===== */
const STORAGE_KEY = '4pic1word_highscore';

// Track current score (level + 1 as score)
let currentScore = 1;

// Update current score when level changes
function updateScore() {
  currentScore = level + 1;
}

// Handle back button click - save high score before leaving
document.getElementById('backBtn').addEventListener('click', function() {
  // Get saved high score
  const savedHighScore = localStorage.getItem(STORAGE_KEY);
  const highScore = savedHighScore ? parseInt(savedHighScore) : 0;
  
  // Only save if current score is higher than saved high score
  if (currentScore > highScore) {
    localStorage.setItem(STORAGE_KEY, currentScore.toString());
    console.log('New high score saved:', currentScore);
  }
  
  // Allow the link to navigate
});

loadLevel();
</script>
</body>
</html>
