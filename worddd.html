<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Word Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -moz-box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
      text-align: center;
    }

    body {
      background: #fde6a8;
    }

    h1 {
      margin-top: 2.5%;
      margin-bottom: 2%;
      color: #f2a133;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    h2 {
      margin-bottom: 1%;
    }

    #main {
      width: 100%;
      margin: 10px auto;
      display: none;
      padding: 20px;
    }

    #main.show {
      display: block;
    }

    .left-div {
      float: left;
      width: 60%;
      height: auto;
      border: 5px solid #f2a133;
      background: white;
      padding: 20px;
      box-sizing: border-box;
    }

    .letters {
      display: flex;
      flex-wrap: wrap;
      width: 100%;
      margin: auto;
      justify-content: center;
    }

    .letters span {
      width: 40px;
      height: 40px;
      line-height: 40px;
      text-align: center;
      font-size: 1em;
      margin: 1px;
      border: 1px solid #ccc;
      display: inline-block;
      background: #fff;
      cursor: pointer;
    }

    .right-div {
      float: right;
      width: 35%;
      height: auto;
      border: 5px solid #f2a133;
      background-color: #f2a133;
      padding: 20px;
      box-sizing: border-box;
    }

    .words {
      font-size: 1.2em;
      max-height: 400px;
      overflow-y: auto;
    }

    .words span {
      display: block;
      width: 100%;
      height: 40px;
      line-height: 40px;
      text-align: center;
      color: white;
      background: #f2a133;
      margin-bottom: 5px;
      border-radius: 4px;
    }

    .strike {
      text-decoration: line-through;
    }

    button {
      border: none;
      font-family: 'Roboto', sans-serif;
    }

    button:hover {
      cursor: pointer;
      background-color:#fde6a8; 
    }

    .letters span.selected {
      background: #f2a133;
      color: white;
      font-weight: bold;
    }

    .words span.found {
      text-decoration: line-through;
      opacity: 0.6;
    }

    #themes {
      width: 80%;
      margin: 20px auto;
    }

    .theme {
      width: 30%;
      margin: 0.5% 1%;
      padding: 10px 0;
      border-radius: 5px;
      background: white;
      display: inline-block;
      font-weight: bold;
      color: #f2a133;
      cursor: pointer;
    }

    .theme:hover {
      border: 2px solid #f2a133;
      background: #fff8e5;
    }

    .theme.active {
      background: #f2a133;
      color: white;
      border: 2px solid #f2a133;
    }

    /* Clear floats */
    .clearfix::after {
      content: "";
      clear: both;
      display: table;
    }
  </style>
</head>

<body>
  <h1>Word Search</h1>

  <div id="themes">
    <h2>Select a Theme:</h2>
    <div class="theme">Fruits & Veggies</div>
    <div class="theme">Animals</div>
    <div class="theme">Cities</div>
  </div>

  <div id="main" class="clearfix">
    <div class="left-div">
      <div class="letters" id="grid"></div>
    </div>

    <div class="right-div">
      <div class="words" id="wordList"></div>
    </div>
  </div>

  <div id="buttons" style="display: none; clear: both;">
    <button style="margin: 20px; padding: 10px 20px; font-size: 1em; background: #f2a133; color: white; border-radius: 4px;" onclick="resetPuzzle()">Reset</button>
  </div>

  <script>
const themes = {
  fruits: {
    words: ['APPLE', 'BANANA', 'ORANGE', 'MANGO', 'KIWI', 'PEACH', 'CHERRY', 'MELON', 'PINEAPPLE', 'STRAWBERRY'],
    grid: [
      'APPLEXQWERTYUIOPA',
      'BANANAZXCVBNMQWER',
      'ORANGETYUIOPASDFGH',
      'MANGOHJKLZXCVBNMQW',
      'KIWIERTTYUIOPASDFG',
      'PEACHHJKLZXCVBNMQW',
      'CHERRYERTTYUIOPASDF',
      'MELONHJKLZXCVBNMQWE',
      'PINEAPPLEQWERTYUIOP',
      'STRAWBERRYASDFGHJKL',
      'XQWERTYUIOPASDFGHJK',
      'ZXCVBNMQWERTYUIOPAS',
      'DFGHJKLZXCVBNMQWERT',
      'YUIOPASDFGHJKLZXCVB'
    ]
  },
  animals: {
    words: ['CAT', 'DOG', 'BIRD', 'FISH', 'LION', 'BEAR', 'EAGLE', 'SHARK', 'ELEPHANT', 'PENGUIN'],
    grid: [
      'CATXQWERTYUIOPZXCVB',
      'DOGAZXCVBNMQWERTYUI',
      'BIRDOPASDFGHJKLZXCV',
      'FISHBNMQWERTYUIOPAS',
      'LIONDFGHJKLZXCVBNMQ',
      'BEARWERTYUIOPASDFGH',
      'EAGLEJKLZXCVBNMQWER',
      'SHARKYUIOPASDFGHJKL',
      'ELEPHANTXCVBNMQWERTY',
      'PENGUINUIOPASDFGHJKL',
      'XQWERTYUIOPASDFGHJKL',
      'ZXCVBNMQWERTYUIOPASA',
      'DFGHJKLZXCVBNMQWERTY',
      'YUIOPASDFGHJKLZXCVBN',
      'MQWERTYUIOPASDFGHJKL'
    ]
  },
  cities: {
    words: ['NEW', 'YORK', 'LONDON', 'PARIS', 'TOKYO', 'BERLIN', 'ROME', 'DUBAI', 'SEATTLE', 'BARCELONA'],
    grid: [
      'NEWXQWERTYUIOPZXCVBN',
      'YORKASDFGHJKLZXCVBNM',
      'LONDONQWERTYUIOPASDFG',
      'PARISHJKLZXCVBNMQWERT',
      'TOKYOYUIOPASDFGHJKLZX',
      'BERLINCVBNMQWERTYUIOPA',
      'ROMESDFGHJKLZXCVBNMQW',
      'DUBAIERTYUIOPASDFGHJKL',
      'SEATTLEZXCVBNMQWERTYUI',
      'BARCELONAOPASDFGHJKLZX',
      'XQWERTYUIOPASDFGHJKLZX',
      'CVBNMQWERTYUIOPASDFGHJ',
      'KLZXCVBNMQWERTYUIOPASE',
      'DFGHJKLZXCVBNMQWERTYUI',
      'OPASDFGHJKLZXCVBNMQWER'
    ]
  }
};

let currentTheme = 'fruits';
let selectedLetters = [];
let foundWords = new Set();
let isMouseDown = false;

function initGame(theme) {
  currentTheme = theme;
  foundWords.clear();
  selectedLetters = [];
  isMouseDown = false;
  renderGrid();
  document.getElementById('main').classList.add('show');
  document.getElementById('buttons').style.display = 'block';
  renderWords();
  updateThemeButtons();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const letters = themes[currentTheme].grid.join('').split('');
  letters.forEach((letter, idx) => {
    const span = document.createElement('span');
    span.textContent = letter;
    span.dataset.index = idx;
    span.addEventListener('mousedown', (e) => startSelection(idx, span, e));
    span.addEventListener('mouseover', (e) => continueSelection(idx, span, e));
    span.addEventListener('mouseup', (e) => endSelection(e));
    grid.appendChild(span);
  });
  document.addEventListener('mouseup', endSelection);
}

function startSelection(idx, element, e) {
  e.preventDefault();
  isMouseDown = true;
  selectedLetters = [];
  document.querySelectorAll('.letters span').forEach(s => s.classList.remove('selected'));
  selectLetter(idx, element);
}

function continueSelection(idx, element, e) {
  if (!isMouseDown) return;
  if (!selectedLetters.includes(idx)) {
    element.classList.add('selected');
    selectedLetters.push(idx);
  }
}

function endSelection(e) {
  isMouseDown = false;
  checkWord();
}

function selectLetter(idx, element) {
  if (!element.classList.contains('selected')) {
    element.classList.add('selected');
    selectedLetters.push(idx);
  }
}

function checkWord() {
  if (selectedLetters.length === 0) return;
  const selected = selectedLetters.map(idx => 
    document.querySelector(`.letters span[data-index="${idx}"]`).textContent
  ).join('');
  const words = themes[currentTheme].words;
  if (words.includes(selected)) {
    foundWords.add(selected);
    document.querySelectorAll('.letters span.selected').forEach(s => s.classList.remove('selected'));
    selectedLetters = [];
    updateWords();
    if (foundWords.size === words.length) {
      alert('You found all words! Great job!');
    }
  }
}

function updateWords() {
  document.querySelectorAll('.words span').forEach(span => {
    if (foundWords.has(span.textContent.trim())) {
      span.classList.add('found');
    }
  });
}

function renderWords() {
  const wordList = document.getElementById('wordList');
  wordList.innerHTML = '';
  themes[currentTheme].words.forEach(word => {
    const span = document.createElement('span');
    span.textContent = word;
    if (foundWords.has(word)) span.classList.add('found');
    wordList.appendChild(span);
  });
}

function updateThemeButtons() {
  document.querySelectorAll('.theme').forEach((btn, idx) => {
    const themes_keys = ['fruits', 'animals', 'cities'];
    if (themes_keys[idx] === currentTheme) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

function resetPuzzle() {
  foundWords.clear();
  selectedLetters = [];
  document.querySelectorAll('.letters span').forEach(s => s.classList.remove('selected'));
  document.querySelectorAll('.words span').forEach(s => s.classList.remove('found'));
}

function goHomepage() {
  window.location.href = 'MINDSPARKKK.html';
}

document.querySelectorAll('.theme').forEach((btn, idx) => {
  const themes_keys = ['fruits', 'animals', 'cities'];
  btn.addEventListener('click', () => initGame(themes_keys[idx]));
});
  </script>
</body>
</html>
