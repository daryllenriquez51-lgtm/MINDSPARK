<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindSpark Sign In</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url("MINDSPARK.jpg") no-repeat center center/cover; /* your background */
    }

    .container {
      display: flex;
      background: rgba(230, 242, 245, 0.95); /* semi-transparent like your box */
      border-radius: 20px;
      width: 1000px;
      max-width: 95%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* Left section */
    .welcome-section {
      flex: 1;
      padding: 60px;
      background: #d8e9ec;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .logo .mind {
      color: #1c2d4a;
    }

    .logo .spark {
      color: #5c6bc0;
    }

    .welcome-section h1 {
      font-size: 42px;
      color: #1c2d4a;
      margin: 0;
      font-weight: 800;
    }

    .welcome-section p {
      font-size: 16px;
      margin-top: 20px;
      color: #333;
      line-height: 1.6;
    }

    /* Right section */
    .signin-section {
      flex: 1;
      background: #f5fcff;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .signin-section h2 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
      color: #1c2d4a;
      border-bottom: 2px solid #ccc;
      display: inline-block;
      align-self: center;
      padding-bottom: 5px;
    }

    label {
      font-weight: bold;
      margin: 10px 0 5px;
      display: block;
      color: #1c2d4a;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 30px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      outline: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #ff99aa, #ff80a1);
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Panel -->
    <div class="welcome-section">
      <div class="logo">
        <span class="mind">MIND</span><span class="spark">SPARK</span>
      </div>
      <h1>WELCOME!</h1>
      <p>
        Hi there, young explorer! We're so happy you stopped by.  
        Discover games, stories, and activities designed just for you.
      </p>
    </div>

    <!-- Right Panel -->
    <div class="signin-section">
      <h2>SIGN IN</h2>
      <form id="loginForm">
        <label for="username">Username:</label>
        <input type="text" id="username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <button class="btn" onclick="window.location.href='MINDSPARKKK.html';">
    SUBMIT
  </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      let username = document.getElementById("username").value;
      let password = document.getElementById("password").value;

      if(username && password){
        alert("Welcome, " + username + "! You have signed in successfully.");
      } else {
        alert("Please enter both username and password.");
      }
    });
  </script>
</body>
</html>
