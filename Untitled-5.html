<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>◤ TETRIS · falling blocks + game over on top-out ◢</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: url('Tetrisss.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }

        .game-row {
            display: flex;
            align-items: flex-start;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* top: hamburger menu - positioned at top outside */
        .hamburger-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .hamburger-icon {
            width: 70px;
            height: 70px;
            background: rgba(40, 65, 85, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 40px;
            border: 3px solid #85b4cf;
            box-shadow: inset 0 -3px 0 #274c62, 0 6px 0 #0e2738;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .hamburger-icon:active {
            transform: translateY(4px);
            box-shadow: inset 0 -2px 0 #1f4055, 0 2px 0 #0e2738;
        }

        .line {
            width: 40px;
            height: 7px;
            background: #ddf0ff;
            border-radius: 8px;
            box-shadow: 0 2px 0 #386277;
        }

        .popup-menu {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .popup-menu.closed {
            display: none;
        }

        .menu-action-btn {
            background: rgba(35, 60, 80, 0.65);
            backdrop-filter: blur(3px);
            border: 3px solid #7baac9;
            color: #ecf9ff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: 22px;
            text-transform: uppercase;
            padding: 12px 8px;
            border-radius: 50px;
            box-shadow: inset 0 -4px 0 #1e3f55, 0 5px 0 #0e293d, 0 0 0 2px #b2d6f0;
            cursor: pointer;
            text-align: center;
        }

        .menu-action-btn:active {
            transform: translateY(4px);
            box-shadow: inset 0 -2px 0 #1e3f55, 0 2px 0 #0e293d;
        }

        .status-indicator {
            margin-top: 18px;
            background: rgba(20, 35, 50, 0.5);
            backdrop-filter: blur(3px);
            border: 2px solid #54809b;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 16px;
            color: #cde1f2;
        }

        /* center: board with transparent black only */
        .board-wrapper {
            background: transparent;
            border: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas#boardCanvas {
            display: block;
            background: rgba(0, 0, 0, 0.65);
            border: none;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
            image-rendering: pixelated;
            width: 300px;
            height: 600px;
        }

        .next-mini {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(3px);
            border: 2px solid rgba(90, 140, 170, 0.5);
            border-radius: 50px;
            padding: 8px 24px 8px 20px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3);
        }

        .next-mini span {
            font-size: 22px;
            font-weight: bold;
            color: #c1e2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 #102b3b;
        }

        canvas#nextSmallCanvas {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 2px solid #4f7995;
            width: 70px;
            height: 70px;
            image-rendering: pixelated;
        }

        /* top right: score - positioned at top outside */
        .score-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .score-label {
            font-size: 22px;
            font-weight: bold;
            color: #d0ecff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 #0a1e2c, 0 0 8px #3f8db3;
        }

        .score-value {
            font-size: 56px;
            font-weight: 900;
            color: #fadf8a;
            text-shadow: 3px 3px 0 #1f3c4e, 0 0 12px #f7b32b;
            line-height: 1.1;
        }
    </style>
</head>
<body>
<!-- hamburger menu - positioned at top outside -->
<div class="hamburger-container">
    <div class="hamburger-icon" id="hamburgerBtn">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>
    <div class="popup-menu closed" id="actionMenu">
        <button class="menu-action-btn" id="btnPause">PAUSED</button>
        <button class="menu-action-btn" id="btnResume">RESUME</button>
        <button class="menu-action-btn" id="btnRestart">RESTART</button>
        <button class="menu-action-btn" id="btnQuit">QUIT</button>
    </div>
    <div class="status-indicator" id="gameStatus">▶ GAME ACTIVE</div>
</div>

<!-- score - positioned at top outside right -->
<div class="score-container">
    <div class="score-label">SCORE:</div>
    <div class="score-value" id="scoreDisplay">0</div>
</div>

<div class="game-row">
    <!-- center: board -->
    <div class="board-wrapper">
        <canvas id="boardCanvas" width="300" height="600"></canvas>
        <div class="next-mini">
            <span>NEXT</span>
            <canvas id="nextSmallCanvas" width="70" height="70"></canvas>
        </div>
    </div>
</div>

<script>
    (function() {
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        const boardCanvas = document.getElementById('boardCanvas');
        const ctx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextSmallCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        const scoreSpan = document.getElementById('scoreDisplay');
        const statusSpan = document.getElementById('gameStatus');

        const pauseBtn = document.getElementById('btnPause');
        const resumeBtn = document.getElementById('btnResume');
        const restartBtn = document.getElementById('btnRestart');
        const quitBtn = document.getElementById('btnQuit');
        const hamburger = document.getElementById('hamburgerBtn');
        const actionMenu = document.getElementById('actionMenu');

        const PIECES = [
            { shape: [[1,1,1,1]], color: '#3ce0e8' },
            { shape: [[1,1],[1,1]], color: '#f7e476' },
            { shape: [[0,1,0],[1,1,1]], color: '#b484e0' },
            { shape: [[0,1,1],[1,1,0]], color: '#6fdb70' },
            { shape: [[1,1,0],[0,1,1]], color: '#e36868' },
            { shape: [[1,0,0],[1,1,1]], color: '#f0a55a' },
            { shape: [[0,0,1],[1,1,1]], color: '#6b9bf5' }
        ];

        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let gameOver = false;
        let paused = false;
        let gameInterval = null;
        const BASE_INTERVAL = 400;

        function randomPiece() {
            const idx = Math.floor(Math.random() * PIECES.length);
            const piece = PIECES[idx];
            return { shape: piece.shape.map(row => [...row]), color: piece.color };
        }

        function collision(shape, offsetX, offsetY) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[0].length; c++) {
                    if (shape[r][c]) {
                        const boardX = offsetX + c;
                        const boardY = offsetY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) return true;
                        if (boardY >= 0 && board[boardY][boardX] !== 0) return true;
                    }
                }
            }
            return false;
        }

        // NEW: check if any block has crossed the top (row < 0)
        function isTopExceeded() {
            for (let col = 0; col < COLS; col++) {
                if (board[0][col] !== 0) return true;  // top row is occupied
            }
            return false;
        }

        function spawnNewPiece() {
            if (!nextPiece) nextPiece = randomPiece();
            currentPiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            nextPiece = randomPiece();

            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameOver = true;
                clearGameInterval();
                statusSpan.innerText = '💀 GAME OVER';
                currentPiece = null;
            } else {
                gameOver = false;
                if (!paused) updateStatusText();
            }
            renderAll();
        }

        function mergePiece() {
            if (!currentPiece) return;

            // 1. Merge current piece into board
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[0].length; c++) {
                    if (currentPiece.shape[r][c]) {
                        const y = currentPiece.y + r;
                        const x = currentPiece.x + c;
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                            board[y][x] = currentPiece.color;
                        }
                    }
                }
            }

            // 2. Clear full rows
            let cleared = 0;
            for (let row = ROWS - 1; row >= 0; ) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col] === 0) { full = false; break; }
                }
                if (full) {
                    for (let r = row; r > 0; r--) board[r] = [...board[r-1]];
                    board[0] = Array(COLS).fill(0);
                    cleared++;
                } else { row--; }
            }

            if (cleared) score += [0, 40, 100, 300, 1200][cleared] || 0;
            updateScore();

            // 3. NEW: Check if blocks have stacked above the top (row 0 occupied)
            if (isTopExceeded()) {
                gameOver = true;
                clearGameInterval();
                statusSpan.innerText = '💀 GAME OVER';
                currentPiece = null;
                renderAll();
                return;
            }

            // 4. Spawn next piece (which may also trigger game over if collision)
            spawnNewPiece();
        }

        function movePiece(dx, dy) {
            if (!currentPiece || gameOver || paused) return false;
            const newX = currentPiece.x + dx;
            const newY = currentPiece.y + dy;
            if (!collision(currentPiece.shape, newX, newY)) {
                currentPiece.x = newX;
                currentPiece.y = newY;
                renderAll();
                return true;
            } else if (dy === 1) {
                mergePiece();
                renderAll();
                return false;
            }
            return false;
        }

        function rotatePiece() {
            if (!currentPiece || gameOver || paused) return;
            const shape = currentPiece.shape;
            const rotated = shape[0].map((_, idx) => shape.map(row => row[idx]).reverse());
            if (!collision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            } else {
                if (!collision(rotated, currentPiece.x - 1, currentPiece.y)) {
                    currentPiece.shape = rotated;
                    currentPiece.x -= 1;
                } else if (!collision(rotated, currentPiece.x + 1, currentPiece.y)) {
                    currentPiece.shape = rotated;
                    currentPiece.x += 1;
                }
            }
            renderAll();
        }

        function renderAll() {
            drawBoard();
            drawNext();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, 300, 600);
            // grid
            ctx.strokeStyle = 'rgba(80, 140, 180, 0.25)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, 600);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(300, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // board blocks
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const color = board[row][col];
                    if (color) {
                        ctx.fillStyle = color;
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-1, BLOCK_SIZE-1);
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-4, 4);
                    }
                }
            }

            // current piece
            if (currentPiece && !gameOver) {
                const { shape, color, x, y } = currentPiece;
                ctx.fillStyle = color;
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[0].length; c++) {
                        if (shape[r][c]) {
                            const bx = (x + c) * BLOCK_SIZE;
                            const by = (y + r) * BLOCK_SIZE;
                            ctx.fillRect(bx, by, BLOCK_SIZE-1, BLOCK_SIZE-1);
                            ctx.fillStyle = 'rgba(255,255,255,0.3)';
                            ctx.fillRect(bx, by, BLOCK_SIZE-6, 5);
                            ctx.fillStyle = color;
                        }
                    }
                }
            }

            // overlays
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, 300, 600);
                ctx.fillStyle = '#ffcba0';
                ctx.font = 'bold 26px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 150, 300);
            } else if (paused && !gameOver) {
                ctx.fillStyle = 'rgba(10,20,30,0.7)';
                ctx.fillRect(0, 0, 300, 600);
                ctx.fillStyle = '#c0e0ff';
                ctx.font = 'bold 34px "Courier New"';
                ctx.fillText('PAUSED', 150, 300);
            }
        }

        function drawNext() {
            nextCtx.clearRect(0, 0, 70, 70);
            nextCtx.fillStyle = 'rgba(0,0,0,0.3)';
            nextCtx.fillRect(0, 0, 70, 70);
            if (nextPiece) {
                const shape = nextPiece.shape;
                const color = nextPiece.color;
                const cols = shape[0].length;
                const rows = shape.length;
                const cell = 14;
                const offX = (5 - cols) * cell / 2;
                const offY = (5 - rows) * cell / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (shape[r][c]) {
                            nextCtx.fillStyle = color;
                            nextCtx.fillRect(offX + c * cell, offY + r * cell, cell-1, cell-1);
                        }
                    }
                }
            }
        }

        function updateScore() { scoreSpan.innerText = score; }
        function updateStatusText() {
            if (gameOver) statusSpan.innerText = '💀 GAME OVER';
            else if (paused) statusSpan.innerText = '⏸ PAUSED';
            else statusSpan.innerText = '▶ GAME ACTIVE';
        }

        function gameTick() { if (!gameOver && !paused && currentPiece) movePiece(0, 1); }
        function clearGameInterval() { if (gameInterval) { clearInterval(gameInterval); gameInterval = null; } }
        function startGameInterval() { clearGameInterval(); gameInterval = setInterval(gameTick, BASE_INTERVAL); }

        function resetGame() {
            clearGameInterval();
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0; updateScore();
            gameOver = false; paused = false;
            nextPiece = randomPiece();
            spawnNewPiece();
            startGameInterval();
            updateStatusText();
            renderAll();
        }

        function quitGame() {
            clearGameInterval();
            gameOver = true; paused = false;
            statusSpan.innerText = '🛑 QUIT';
            renderAll();
        }

        pauseBtn.addEventListener('click', () => { if (!gameOver) { paused = true; updateStatusText(); renderAll(); } });
        resumeBtn.addEventListener('click', () => { if (!gameOver) { paused = false; updateStatusText(); renderAll(); } });
        restartBtn.addEventListener('click', resetGame);
        quitBtn.addEventListener('click', quitGame);

        hamburger.addEventListener('click', () => actionMenu.classList.toggle('closed'));

        window.addEventListener('keydown', (e) => {
            if (gameOver || paused) return;
            switch(e.key) {
                case 'ArrowLeft': e.preventDefault(); movePiece(-1,0); break;
                case 'ArrowRight': e.preventDefault(); movePiece(1,0); break;
                case 'ArrowDown': e.preventDefault(); movePiece(0,1); break;
                case 'ArrowUp': e.preventDefault(); rotatePiece(); break;
                case ' ': e.preventDefault();
                    if (!currentPiece || paused) return;
                    while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y+1)) currentPiece.y++;
                    mergePiece(); renderAll();
                    break;
                default: break;
            }
        });
        window.addEventListener('keydown', (e) => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
        }, { passive: false });

        resetGame();
        actionMenu.classList.add('closed');
    })();
</script>
</body>
</html>
