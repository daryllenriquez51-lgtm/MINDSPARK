<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background-image: url('mindsparkbg.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.app{
  max-width:1400px;
  height:90vh;
  margin:30px auto;
  background: rgba(255,255,255,0.5);
  border-radius:30px;
  display:flex;
  overflow:hidden;
  box-shadow:0 25px 50px rgba(0,0,0,.1);
  opacity: 0;
  animation: fadeIn 1s ease-in-out 0.1s forwards;
}

.sidebar{
  width:230px;
  background: rgba(255,255,255,0.5);
  padding:30px 20px;
}

.logo{
  font-size:22px;
  font-weight:600;
  margin-bottom:40px;
}

.menu a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 15px;
  margin-bottom:10px;
  text-decoration:none;
  color:#666;
  border-radius:12px;
  font-size:14px;
}

.menu a.active,
.menu a:hover{
  background:#dee7ff;
  color:#5a7bd4;
}

.content{
  flex:1;
  padding:30px 40px;
  display:flex;
  gap:30px;
}

.left{
  flex:2;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.header h2 span{
  color:#5a7bd4;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
  margin-bottom:25px;
}

.lesson{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-radius:15px;
  font-size:14px;
  margin-bottom:10px;
}

.geo{background:#eef0ff;}
.phy{background:#ffe7e1;}
.chem{background:#e8fbf1;}
.pe{background:#fff3d9;}
.math{background:#e6f7ff;}

.calendar{
  margin-top:15px;
  overflow-y: auto;
  max-height: 400px;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.calendar-header button{
  background:#5a7bd4;
  color:white;
  border:none;
  border-radius:5px;
  padding:5px 10px;
  cursor:pointer;
  font-size:14px;
}

.calendar-header button:hover{
  background: #5a7bd4;
}

.calendar-days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-bottom:10px;
}

.calendar-days div{
  text-align:center;
  padding:8px;
  font-weight:600;
  font-size:12px;
  color:#666;
}

.calendar-dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.calendar-dates .date{
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius:50%;
  font-size:13px;
  cursor:pointer;
  position:relative;
  transition:background 0.2s;
}

.calendar-dates .date:hover{
  background:#f0f0f0;
}

.calendar-dates .today{
  background:#6e4cc9;
  color:white;
}

.calendar-dates .date.other-month{
  color:#ccc;
}

.calendar-dates .date.has-tasks::after{
  content:'';
  position:absolute;
  bottom:2px;
  left:50%;
  transform:translateX(-50%);
  width:4px;
  height:4px;
  background:#5a7bd4;
  border-radius:50%;
}

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:20px;
  width:300px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.modal-content h3{
  margin-bottom:15px;
  text-align:center;
}

.modal-content input, .modal-content textarea{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border:1px solid #ccc;
  border-radius:5px;
  font-family:'Poppins',sans-serif;
}

.modal-content button{
  width:100%;
  padding:8px;
  background:#7494ec;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:10px;
}

.modal-content button:hover{
  background:#5a7bd4;
}

.close{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
  font-size:20px;
}

.right{
  flex:1;
}

.profile{
  text-align:center;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background-image: url('AVATARICON.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  margin:0 auto 10px;
}

.stats div{
  background:#f6f8fc;
  padding:12px;
  border-radius:15px;
  font-size:14px;
  margin-top:10px;
}

.progress{
  margin-top:20px;
}

.circle{
  width:100%;
  aspect-ratio:1;
  max-width:150px;
  border-radius:50%;
  background:conic-gradient(#6e4cc9, #b89eff 260deg,#eee 260deg);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto;
}

.circle span{
  font-weight:600;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { transform: translateX(-100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.sidebar {
  animation: slideInLeft 0.8s ease-out 0.3s both;
}

.card {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

.calendar-dates .date {
  transition: all 0.3s ease;
}

.calendar-dates .date:hover {
  transform: scale(1.2);
  background: #5a7bd4 !important;
  color: white;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.modal {
  animation: bounceIn 0.5s ease-out;
}

.modal-content {
  animation: fadeIn 0.4s ease-out;
}

@media(max-width:1100px){
  .content{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <div class="logo"><button id="back-btn" style="background:#7494ec; color:white; border:none; border-radius:5px; padding:8px 12px; cursor:pointer; margin-right: 10px;">&larr;</button> <span style="color:#7494ec;">Profile</span></div>
    <div class="menu">
      <a id="menu-dashboard" class="active">Dashboard</a>
      <a id="menu-logout" style="margin-top: 400px; cursor: pointer;">Logout</a>
    </div>
  </div>

  <div class="content">

    <div class="left">

      <div class="header">
        <h2><span id="greeting-text">Hello</span>, <span id="greeting-name">Anna!</span></h2>
      </div>

      <div class="card" id="timetable-card">
        <h3>Timetable</h3><br>
        <div id="add-task-form">
          <input type="text" id="task-subject" placeholder="Subject" style="padding: 8px; margin-right: 10px; border-radius: 5px; border: 1px solid #ccc;">
          <input type="text" id="task-time" placeholder="Time (e.g., 07:30 – 08:15)" style="padding: 8px; margin-right: 10px; border-radius: 5px; border: 1px solid #ccc;">
          <button id="add-task-btn" style="padding: 8px 12px; background: #7494ec; color: white; border: none; border-radius: 5px; cursor: pointer;">Add Task</button>
        </div>
        <div id="timetable-list" style="margin-top: 20px;">
        </div>
      </div>

      <div class="card">
        <h3>Homework & Tests</h3>
        <div class="calendar">
          <div class="calendar-header">
            <button id="prev-month"><</button>
            <span id="month-year"></span>
            <button id="next-month">></button>
          </div>
          <div class="calendar-days">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div class="calendar-dates" id="calendar-dates">
          </div>
        </div>
      </div>

    </div>

    <div class="right">

      <div class="card profile">
        <div class="avatar"></div>
        <strong id="profile-name">Anna Kowalska</strong>
        <p>Student</p>

        <div class="achievements">
          <h4 style="margin-top: 20px; margin-bottom: 10px;">🏆 Achievements</h4>
          <div class="stats">
            <div>🎯 Lucky Number: <strong id="achieve-lucky">0</strong></div>
            <div>⭐ Average Mark: <strong id="achieve-mark">0.00</strong></div>
            <div>🏆 Class Rank: <strong id="achieve-rank">0</strong></div>
            <div>🌴 Tasks Completed: <strong id="achieve-tasks">0</strong></div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<div class="modal" id="task-modal">
  <div class="modal-content">
    <span class="close" id="close-modal">&times;</span>
    <h3 id="modal-title">Homework/Tasks for <span id="modal-date"></span></h3>
    <div id="existing-tasks" style="margin-bottom: 15px;"></div>
    <h4>Add New Task</h4>
    <input type="text" id="task-subject-modal" placeholder="Subject">
    <textarea id="task-description-modal" placeholder="Description" rows="3"></textarea>
    <button id="save-task-btn">Save Task</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const username = localStorage.getItem('username') || 'Student';
    const loginType = localStorage.getItem('loginType');
    
    const greetingText = loginType === 'register' ? 'Hello' : 'Welcome back';
    document.getElementById('greeting-text').textContent = greetingText;
    document.getElementById('greeting-name').textContent = username + '!';
    document.getElementById('profile-name').textContent = username;

    loadAchievements();

    document.getElementById('back-btn').addEventListener('click', () => {
      window.location.href = 'MINDSPARKKK.html';
    });

    // Logout functionality (FIXED)
document.getElementById('menu-logout').addEventListener('click', function(e) {

  e.preventDefault();     // stop link behavior
  e.stopPropagation();    // stop menu switching

  const confirmLogout = confirm("Are you sure you want to logout?");

  if (confirmLogout) {
    localStorage.removeItem('username');
    localStorage.removeItem('loginType');
    window.location.href = 'Login.html';
  } else {
    // Stay on dashboard
    document.querySelectorAll('.menu a').forEach(i => i.classList.remove('active'));
    document.getElementById('menu-dashboard').classList.add('active');
  }

  });

    loadTasks();
    document.getElementById('add-task-btn').addEventListener('click', addTask);

    const menuItems = document.querySelectorAll('.menu a');
    menuItems.forEach(item => {
      item.addEventListener('click', function() {
        menuItems.forEach(i => i.classList.remove('active'));
        this.classList.add('active');
        showSection(this.id.replace('menu-', ''));
      });
    });

    function showSection(section) {
      const left = document.querySelector('.left');
      const right = document.querySelector('.right');
      const header = document.querySelector('.header h2');
      left.innerHTML = '';
      right.innerHTML = '';

      if (section === 'dashboard') {
        header.innerHTML = '<span id="greeting-text">Hello</span>, <span id="greeting-name">Anna!</span>';
        left.innerHTML = `
          <div class="card" id="timetable-card">
            <h3>Timetable</h3><br>
            <div id="add-task-form">
              <input type="text" id="task-subject" placeholder="Subject" style="padding: 8px; margin-right: 10px; border-radius: 5px; border: 1px solid #ccc;">
              <input type="text" id="task-time" placeholder="Time (e.g., 07:30 – 08:15)" style="padding: 8px; margin-right: 10px; border-radius: 5px; border: 1px solid #ccc;">
              <button id="add-task-btn" style="padding: 8px 12px; background: #7494ec; color: white; border: none; border-radius: 5px; cursor: pointer;">Add Task</button>
            </div>
            <div id="timetable-list" style="margin-top: 20px;"></div>
          </div>
          <div class="card">
            <h3>Homework & Tests</h3>
            <div class="calendar">
              <div class="calendar-header">
                <button id="prev-month"><</button>
                <span id="month-year"></span>
                <button id="next-month">></button>
              </div>
              <div class="calendar-days">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
              </div>
              <div class="calendar-dates" id="calendar-dates"></div>
            </div>
          </div>
        `;
        right.innerHTML = `
          <div class="card profile">
            <div class="avatar"></div>
            <strong id="profile-name">Anna Kowalska</strong>
            <p>Student</p>
            <div class="achievements">
              <h4 style="margin-top: 20px; margin-bottom: 10px;">🏆 Achievements</h4>
              <div class="stats">
                <div>🎯 Lucky Number: <strong id="achieve-lucky">0</strong></div>
                <div>⭐ Average Mark: <strong id="achieve-mark">0.00</strong></div>
                <div>🏆 Class Rank: <strong id="achieve-rank">0</strong></div>
                <div>🌴 Tasks Completed: <strong id="achieve-tasks">0</strong></div>
              </div>
            </div>
          </div>
        `;
        loadTasks();
        loadAchievements();
        document.getElementById('add-task-btn').addEventListener('click', addTask);
        renderCalendar(currentDate);
        document.getElementById('prev-month').addEventListener('click', () => {
          currentDate.setMonth(currentDate.getMonth() - 1);
          renderCalendar(currentDate);
        });
        document.getElementById('next-month').addEventListener('click', () => {
          currentDate.setMonth(currentDate.getMonth() + 1);
          renderCalendar(currentDate);
        });
      } else {
        header.textContent = section.charAt(0).toUpperCase() + section.slice(1);
        left.innerHTML = `<div class="card"><h3>${section.charAt(0).toUpperCase() + section.slice(1)}</h3><p>This section is under development.</p></div>`;
        right.innerHTML = `<div class="card"><h3>Profile</h3><div class="avatar"></div><strong id="profile-name">${username}</strong><p>Student</p></div>`;
      }
    }

    let currentDate = new Date();
    renderCalendar(currentDate);

    document.getElementById('prev-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar(currentDate);
    });

    document.getElementById('next-month').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar(currentDate);
    });

    const modal = document.getElementById('task-modal');
    const closeModal = document.getElementById('close-modal');
    const saveTaskBtn = document.getElementById('save-task-btn');
    let selectedDate = null;

    closeModal.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });

    saveTaskBtn.addEventListener('click', () => {
      const subject = document.getElementById('task-subject-modal').value.trim();
      const description = document.getElementById('task-description-modal').value.trim();
      if (subject && selectedDate) {
        const tasks = getCalendarTasks();
        const dateKey = selectedDate.toISOString().split('T')[0];
        if (!tasks[dateKey]) tasks[dateKey] = [];
        tasks[dateKey].push({ subject, description, id: Date.now() });
        saveCalendarTasks(tasks);
        renderCalendar(currentDate);
        modal.style.display = 'none';
        document.getElementById('task-subject-modal').value = '';
        document.getElementById('task-description-modal').value = '';
      }
    });
  });

  function addTask() {
    const subject = document.getElementById('task-subject').value.trim();
    const time = document.getElementById('task-time').value.trim();
    if (subject && time) {
      const tasks = getTasks();
      tasks.push({ subject, time, id: Date.now() });
      saveTasks(tasks);
      loadTasks();
      updateAchievements();
      document.getElementById('task-subject').value = '';
      document.getElementById('task-time').value = '';
    }
  }

  function deleteTask(id) {
    const tasks = getTasks().filter(task => task.id !== id);
    saveTasks(tasks);
    loadTasks();
    updateAchievements();
  }

  function getTasks() {
    return JSON.parse(localStorage.getItem('timetableTasks') || '[]');
  }

  function saveTasks(tasks) {
    localStorage.setItem('timetableTasks', JSON.stringify(tasks));
  }

  function loadTasks() {
    const tasks = getTasks();
    const list = document.getElementById('timetable-list');
    if (!list) return;
    list.innerHTML = '';
    tasks.forEach(task => {
      const taskDiv = document.createElement('div');
      taskDiv.className = 'lesson';
      taskDiv.style.background = getRandomColor();
      taskDiv.innerHTML = `
        <span>${task.subject}</span>
        <span>${task.time} <button onclick="deleteTask(${task.id})" style="margin-left: 10px; background: red; color: white; border: none; border-radius: 3px; cursor: pointer;">Delete</button></span>
      `;
      list.appendChild(taskDiv);
    });
  }

  function getRandomColor() {
    const colors = ['#eef0ff', '#ffe7e1', '#e8fbf1', '#fff3d9', '#e6f7ff'];
    return colors[Math.floor(Math.random() * colors.length)];
  }

  function renderCalendar(date) {
    const monthYear = document.getElementById('month-year');
    const calendarDates = document.getElementById('calendar-dates');
    const tasks = getCalendarTasks();

    monthYear.textContent = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    const firstDay = new Date(date.getFullYear(), date.getMonth(), 1);
    const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
    const startDate = new Date(firstDay);
    startDate.setDate(startDate.getDate() - firstDay.getDay());

    const endDate = new Date(lastDay);
    endDate.setDate(endDate.getDate() + (6 - lastDay.getDay()));

    calendarDates.innerHTML = '';

    for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
      const dateDiv = document.createElement('div');
      dateDiv.className = 'date';
      dateDiv.textContent = d.getDate();

      const dateKey = d.toISOString().split('T')[0];
      if (tasks[dateKey] && tasks[dateKey].length > 0) {
        dateDiv.classList.add('has-tasks');
      }

      if (d.getMonth() !== date.getMonth()) {
        dateDiv.classList.add('other-month');
      }

      const today = new Date();
      if (d.toDateString() === today.toDateString()) {
        dateDiv.classList.add('today');
      }

      dateDiv.addEventListener('click', () => {
        selectedDate = new Date(d);
        openTaskModal(selectedDate);
      });

      calendarDates.appendChild(dateDiv);
    }
  }

  function getCalendarTasks() {
    return JSON.parse(localStorage.getItem('calendarTasks') || '{}');
  }

  function saveCalendarTasks(tasks) {
    localStorage.setItem('calendarTasks', JSON.stringify(tasks));
  }

  function openTaskModal(date) {
    selectedDate = date;
    const dateKey = date.toISOString().split('T')[0];
    const tasks = getCalendarTasks();
    const existingTasksDiv = document.getElementById('existing-tasks');
    existingTasksDiv.innerHTML = '';

    if (tasks[dateKey] && tasks[dateKey].length > 0) {
      tasks[dateKey].forEach(task => {
        const taskDiv = document.createElement('div');
        taskDiv.style.border = '1px solid #ccc';
        taskDiv.style.padding = '8px';
        taskDiv.style.marginBottom = '8px';
        taskDiv.style.borderRadius = '5px';
        taskDiv.innerHTML = `
          <strong>${task.subject}</strong><br>
          ${task.description}<br>
          <button onclick="deleteCalendarTask('${dateKey}', ${task.id})" style="background: red; color: white; border: none; border-radius: 3px; cursor: pointer;">Delete</button>
        `;
        existingTasksDiv.appendChild(taskDiv);
      });
    } else {
      existingTasksDiv.innerHTML = '<p>No tasks for this date.</p>';
    }

    document.getElementById('modal-date').textContent = date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('task-modal').style.display = 'flex';
  }

  function deleteCalendarTask(dateKey, id) {
    const tasks = getCalendarTasks();
    if (tasks[dateKey]) {
      tasks[dateKey] = tasks[dateKey].filter(task => task.id !== id);
      saveCalendarTasks(tasks);
      renderCalendar(currentDate);
      openTaskModal(selectedDate);
      updateAchievements();
    }
  }

  function getAchievements() {
    return JSON.parse(localStorage.getItem('achievements') || '{"lucky":0,"mark":0,"rank":0,"tasks":0}');
  }

  function saveAchievements(achievements) {
    localStorage.setItem('achievements', JSON.stringify(achievements));
  }

  function loadAchievements() {
    const achievements = getAchievements();
    const luckyEl = document.getElementById('achieve-lucky');
    const markEl = document.getElementById('achieve-mark');
    const rankEl = document.getElementById('achieve-rank');
    const tasksEl = document.getElementById('achieve-tasks');
    
    if (luckyEl) luckyEl.textContent = achievements.lucky;
    if (markEl) markEl.textContent = parseFloat(achievements.mark).toFixed(2);
    if (rankEl) rankEl.textContent = achievements.rank;
    if (tasksEl) tasksEl.textContent = achievements.tasks;
  }

  function updateAchievements() {
    const achievements = getAchievements();
    achievements.tasks += 1;
    achievements.lucky = Math.floor(Math.random() * 100) + 1;
    achievements.mark = parseFloat(achievements.mark) + Math.random() * 2;
    achievements.rank = Math.max(1, parseInt(achievements.rank) + Math.floor(Math.random() * 3) - 1);
    saveAchievements(achievements);
    loadAchievements();
  }
</script>

</body>
</html>
