<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matching Type</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background-image: url('Count%20the%20Dots%20bg.png');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin-top: 60px;
      position: relative;
    }

    /* BACK BUTTON - white circle, fully working */
    .back-btn {
      position: fixed;
      top: 22px;
      left: 25px;
      width: 52px;
      height: 52px;
      background-color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: black;
      font-size: 36px;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: 0.2s ease;
      z-index: 999;
      border: none;
      cursor: pointer;
    }

    .back-btn:hover {
      background-color: #f0f0f0;
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.25);
    }

    .icon-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 0px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .icon-row img {
      width: 100%;
      max-width: 200px;
      height: auto;
      border-radius: 0;
    }

    h1 {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4);
      margin-bottom: 0px;
      line-height: 1.1;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      opacity: 0.9;
      margin-bottom: 5px;
      letter-spacing: 2px;
      margin-top: -5px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background-color: white;
      opacity: 0.6;
      margin: 3px 0 8px;
    }

    .info-section {
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      flex-wrap: wrap;
      text-align: left;
      margin-bottom: 0px;
      position: relative;
      padding: 0px 0;
    }

    .info-section::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background-color: rgba(255, 255, 255, 0.3);
      transform: translateX(-50%);
    }

    .stats {
      display: flex;
      gap: 90px;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding-right: 50px;
    }

    .stats div {
      text-align: center;
      flex: 1;
      min-width: 120px;
    }

    .stats h3 {
      font-size: 64px;
      margin-bottom: 6px;
      font-weight: 800;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.4);
    }

    .stats p {
      font-size: 18px;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    .benefits {
      text-align: left;
      flex: 1;
      padding-left: 50px;
      font-size: 16px;
      line-height: 2em;
      opacity: 0.9;
      min-width: 250px;
    }

    .benefits strong {
      font-size: 22px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 10px;
    }

    .benefits p {
      margin: 6px 0;
    }

    .play-btn {
      background: rgba(255, 255, 255, 0.85);
      color: #4a2f2f;
      padding: 18px 90px;
      border-radius: 50px;
      border: none;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.25);
      margin-top: 80px;
      margin-bottom: 50px;
      transition: 0.2s ease;
    }

    .play-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 0 rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 900px) {
      .info-section {
        flex-direction: column;
        align-items: center;
      }

      .info-section::after {
        display: none;
      }

      .stats {
        padding: 0;
        margin-bottom: 40px;
      }

      .benefits {
        padding: 0;
        text-align: center;
      }
      
      .play-btn {
        margin-top: 70px;
      }
      
      .container {
        margin-top: 50px;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      h2 {
        font-size: 18px;
      }

      .stats h3 {
        font-size: 48px;
      }

      .play-btn {
        padding: 16px 70px;
        font-size: 24px;
        margin-top: 60px;
      }
      
      .container {
        margin-top: 45px;
      }
    }
    
    @media (max-width: 480px) {
      .play-btn {
        margin-top: 50px;
      }
      
      .container {
        margin-top: 40px;
      }
      
      .back-btn {
        width: 44px;
        height: 44px;
        font-size: 30px;
        top: 15px;
        left: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- BACK BUTTON - WHITE CIRCLE & NOW REDIRECTS TO SPECIFIC FILE -->
    <a href="MINDSPARKKK.html" class="back-btn" id="backButton">&#8592;</a>

    <div class="icon-row">
      <img src="logocount.png" alt="Count the dots word logo">
    </div>

    <h1>COUNT THE DOTS</h1>
    <h2>GAMES</h2>

    <div class="divider"></div>

    <div class="info-section">
      <div class="stats">
        <div>
          <h3 id="score">0</h3>
          <p>HIGH SCORE</p>
        </div>
        <div>
          <h3 id="difficulty">0</h3>
          <p>DIFFICULTY</p>
        </div>
      </div>

      <div class="benefits">
        <strong>BENEFITS:</strong>
        <p>🔢 Improves basic counting skills.</p>
        <p>👀 Strengthens visual attention and focus.</p>
        <p>🧠 Helps develop number recognition.</p>
      </div>
    </div>

    <div class="divider"></div>

    <button class="play-btn" id="playBtn">PLAY</button>
  </div>

  <script>
    let score = 0;
    let difficulty = 0;

    const scoreDisplay = document.getElementById("score");
    const difficultyDisplay = document.getElementById("difficulty");
    const playBtn = document.getElementById("playBtn");
    const backBtn = document.getElementById("backButton");

    playBtn.addEventListener("click", () => {
      // Redirect to next page
      setTimeout(() => {
        window.location.href = "Count the dots.html";
      }, 800);
    });

    // Optional: Add click handler for back button as backup
    backBtn.addEventListener("click", function(event) {
      // The href attribute will handle the navigation
      // This is just to ensure it works even if there are issues
      console.log("Going back to MINDSPARKKK.html");
    });
  </script>
</body>
</html>
