<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Signup Form</title>

  <!-- Boxicons -->
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <!-- CSS -->
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
      text-decoration: none;
      list-style: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: url('mindsparkbg.jpg') no-repeat center center fixed;
      background-size: cover;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    body.fade-out {
      opacity: 0;
    }

    .container {
      position: relative;
      width: 850px;
      height: 550px;
      background: #fff;
      border-radius: 30px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .container h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .container p {
      font-size: 14.5px;
      margin: 15px 0;
    }

    form {
      width: 100%;
    }

    /* FORM BOX */
    .form-box {
      position: absolute;
      right: 0;
      width: 50%;
      height: 100%;
      padding: 40px;
      display: flex;
      align-items: center;
      text-align: center;
      background: #fff;
      transition: 0.6s ease-in-out 1.2s;
      z-index: 1;
    }

    .container.active .form-box {
      right: 50%;
    }

    .form-box.register {
      visibility: hidden;
    }

    .container.active .form-box.register {
      visibility: visible;
    }

    .input-box {
      position: relative;
      margin: 30px 0;
    }

    .input-box input {
      width: 100%;
      padding: 13px 50px 13px 20px;
      background: #eee;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    .input-box i {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
    }

    .forgot-link {
      margin: -15px 0 15px;
    }

    .forgot-link a {
      color: #333;
      font-size: 14px;
    }

    .btn {
      width: 100%;
      height: 48px;
      background: #7494ec;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }

    .social-icons {
      display: flex;
      justify-content: center;
    }

    .social-icons a {
      display: inline-flex;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 24px;
      color: #333;
      margin: 0 8px;
    }

    /* TOGGLE */
    .toggle-box {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .toggle-box::before {
      content: "";
      position: absolute;
      left: -250%;
      width: 300%;
      height: 100%;
      background: #7494ec;
      border-radius: 150px;
      transition: 1.8s ease-in-out;
      z-index: 2;
    }

    .container.active .toggle-box::before {
      left: 50%;
    }

    .toggle-panel {
      position: absolute;
      width: 50%;
      height: 100%;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 3;
      transition: 0.6s ease-in-out;
    }

    .toggle-left {
      left: 0;
      transition-delay: 1.2s;
    }

    .container.active .toggle-left {
      left: -50%;
      transition-delay: 0.6s;
    }

    .toggle-right {
      right: -50%;
      transition-delay: 0.6s;
    }

    .container.active .toggle-right {
      right: 0;
      transition-delay: 1.2s;
    }

    .toggle-panel .btn {
      width: 160px;
      background: transparent;
      border: 2px solid #fff;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInBounce {
      0% { transform: translateY(-100px); opacity: 0; }
      60% { transform: translateY(10px); opacity: 1; }
      100% { transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .logo {
      animation: fadeIn 1s ease-in-out;
    }

    .title {
      animation: slideInBounce 1s ease-out 0.3s both, float 3s ease-in-out 1.5s infinite;
    }

    .start-btn {
      background: linear-gradient(to right, #ff69b4, #ffb6c1);
      color: white;
      border: none;
      padding: 10px 70px;
      font-size: 30px;
      border-radius: 25px;
      margin-top: 5px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    .start-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
    }
  </style>
</head>

<body>

  <div style="display: flex; flex-direction: column; align-items: center;">
    <img src="MINDSPARKLOGO2.png" style="width: 400px; height: auto;" alt="Logo" class="logo">
    <img src="MINDSPARKTITLE2.png" style="width: 750px; height: auto; margin-top: -20px;" alt="Title" class="title">
<button class="start-btn" onclick="window.location.href='Login.html'">START</button>
  </div>

</body>
</html>
